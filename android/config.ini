[kivy]
log_level = warning
log_dir = .kivy/logs
log_enable = 0
default_font = ['PingFang', 'fonts/PingFang.ttc']
window_icon =

[graphics]
window_state = normal
width = 360
height = 748
borderless = 0
fullscreen = 0
maxfps = 60
resizable = 0
minimum_width = 320
minimum_height = 640

[input]
mouse = mouse
