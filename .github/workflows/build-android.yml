name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK (Debug)
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          build-essential git autoconf automake libtool pkg-config cmake \
          openjdk-17-jdk-headless \
          libltdl-dev libffi-dev libssl-dev \
          python3-dev python3-venv \
          gettext
        sudo apt-get install -y autopoint 2>/dev/null || true
        which autopoint || echo "WARNING: autopoint not found!"
        ls /usr/bin/autopoint* 2>/dev/null || echo "No autopoint in /usr/bin"
        dpkg -L gettext 2>/dev/null | grep autopoint || echo "No autopoint in gettext package"

    - name: Install Python tools
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython setuptools

    - name: Build APK
      working-directory: android
      run: |
        set +o pipefail
        buildozer -v android debug 2>&1 | tee buildozer_output.txt
        EXIT_CODE=${PIPESTATUS[0]}
        set -o pipefail
        echo "BUILDOZER EXIT CODE: ${EXIT_CODE}"
        if [ "${EXIT_CODE}" -ne 0 ]; then
          echo "BUILD FAILED WITH CODE ${EXIT_CODE}"
          tail -50 buildozer_output.txt
        fi
        exit ${EXIT_CODE}
      env:
        BUILDOZER_ALLOW_ROOT: 1

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: CryptoScannerPro-Debug
        path: android/bin/*.apk
        retention-days: 30

    - name: Show tail of build log on failure
      if: failure()
      working-directory: android
      run: |
        echo "=== LAST 50 LINES OF buildozer_output.txt ==="
        tail -50 buildozer_output.txt 2>/dev/null || echo "(no buildozer_output.txt)"
        echo "=== SEARCHING FOR ERRORS IN OUTPUT ==="
        grep -i "error\|exception\|traceback\|FAILED\|fatal" buildozer_output.txt 2>/dev/null | tail -30 || echo "(no output file)"
        echo "=== SEARCHING FOR ERRORS IN .buildozer ==="
        grep -ri "error\|exception\|traceback\|FAILED\|fatal" .buildozer/ 2>/dev/null | tail -50 || echo "(no .buildozer dir)"

    - name: Upload buildozer output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-output
        path: android/buildozer_output.txt
        retention-days: 7

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: android/.buildozer/android/platform/build/build.log
        retention-days: 7
