name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK (Debug)
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          build-essential git autoconf automake libtool pkg-config cmake \
          openjdk-17-jdk-headless \
          libltdl-dev libffi-dev libssl-dev \
          python3-dev python3-venv \
          gettext
        sudo apt-get install -y autopoint 2>/dev/null || true
        which autopoint || echo "WARNING: autopoint not found!"
        ls /usr/bin/autopoint* 2>/dev/null || echo "No autopoint in /usr/bin"
        dpkg -L gettext 2>/dev/null | grep autopoint || echo "No autopoint in gettext package"

    - name: Install Python tools
      run: |
        python -m pip install --upgrade pip
        pip install buildozer "cython<3" setuptools

    - name: Set Java 17
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"

    - name: Setup Android SDK (download cmdline-tools + symlink as tools/)
      run: |
        SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
        rm -rf "$SDK_ROOT"
        mkdir -p "$SDK_ROOT"
        # Download cmdline-tools
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools "$SDK_ROOT/cmdline-tools"
        # Symlink as tools/ so buildozer finds tools/bin/sdkmanager
        ln -s "$SDK_ROOT/cmdline-tools" "$SDK_ROOT/tools"
        # Accept licenses
        yes | "$SDK_ROOT/tools/bin/sdkmanager" --sdk_root="$SDK_ROOT" --licenses 2>/dev/null || true
        mkdir -p "$SDK_ROOT/licenses"
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$SDK_ROOT/licenses/android-sdk-license"
        echo "SDK ready, sdkmanager: $(ls -la "$SDK_ROOT/tools/bin/sdkmanager")"

    - name: Pin p4a to Python 3.11 (master now defaults to 3.14)
      working-directory: android
      run: |
        P4A_DIR="../python-for-android-pinned"
        rm -rf "$P4A_DIR"
        # Clone develop branch which still uses Python 3.11
        git clone --depth=1 --branch develop https://github.com/kivy/python-for-android.git "$P4A_DIR"
        # If develop also uses 3.14, revert hostpython3 recipe
        HOSTPY="$P4A_DIR/pythonforandroid/recipes/hostpython3/__init__.py"
        if grep -q "3.14" "$HOSTPY" 2>/dev/null; then
          sed -i 's/version\s*=\s*"[^"]*"/version = "3.11.5"/' "$HOSTPY"
          sed -i 's|v[0-9]\+\.[0-9]\+\.[0-9]\+\.tar\.gz|v3.11.5.tar.gz|' "$HOSTPY"
        fi
        PY3="$P4A_DIR/pythonforandroid/recipes/python3/__init__.py"
        if [ -f "$PY3" ] && grep -q "3.14" "$PY3" 2>/dev/null; then
          sed -i 's/version\s*=\s*"[^"]*"/version = "3.11.5"/' "$PY3"
          sed -i 's|v[0-9]\+\.[0-9]\+\.[0-9]\+\.tar\.gz|v3.11.5.tar.gz|' "$PY3"
        fi
        echo "p4a Python version: $(grep 'version\s*=' "$HOSTPY" | head -1)"

    - name: Build APK
      working-directory: android
      run: |
        set +o pipefail
        buildozer -v android debug 2>&1 | tee buildozer_output.txt
        EXIT_CODE=${PIPESTATUS[0]}
        set -o pipefail
        echo "BUILDOZER EXIT CODE: ${EXIT_CODE}"
        if [ "${EXIT_CODE}" -ne 0 ]; then
          echo "BUILD FAILED WITH CODE ${EXIT_CODE}"
          tail -50 buildozer_output.txt
        fi
        exit ${EXIT_CODE}
      env:
        BUILDOZER_ALLOW_ROOT: 1
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: CryptoScannerPro-Debug
        path: android/bin/*.apk
        retention-days: 30

    - name: Show tail of build log on failure
      if: failure()
      working-directory: android
      run: |
        echo "=== LAST 50 LINES OF buildozer_output.txt ==="
        tail -50 buildozer_output.txt 2>/dev/null || echo "(no buildozer_output.txt)"
        echo "=== SEARCHING FOR ERRORS IN OUTPUT ==="
        grep -i "error\|exception\|traceback\|FAILED\|fatal" buildozer_output.txt 2>/dev/null | tail -30 || echo "(no output file)"
        echo "=== SEARCHING FOR ERRORS IN .buildozer ==="
        grep -ri "error\|exception\|traceback\|FAILED\|fatal" .buildozer/ 2>/dev/null | tail -50 || echo "(no .buildozer dir)"

    - name: Publish build output to public release
      if: always()
      working-directory: android
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="build-log-run-${{ github.run_number }}"
        git tag -f "$TAG"
        git push -f origin "$TAG" 2>/dev/null || true
        
        # Delete existing release if any, then create new
        curl -s -X DELETE \
          -H "Authorization: token $GH_TOKEN" \
          "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" 2>/dev/null || true
        
        # Create release
        RELEASE_ID=$(curl -s -X POST \
          -H "Authorization: token $GH_TOKEN" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/${{ github.repository }}/releases" \
          -d "{\"tag_name\":\"$TAG\",\"name\":\"Build Log #${{ github.run_number }}\",\"body\":\"Commit: ${{ github.sha }}\nStatus: ${{ job.status }}\"}" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("id",""))')
        
        # Upload build output as release asset
        if [ -n "$RELEASE_ID" ] && [ -f buildozer_output.txt ]; then
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: text/plain" \
            --data-binary @buildozer_output.txt \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=buildozer_output.txt"
        fi

        # Upload APK to release if build succeeded
        if [ -n "$RELEASE_ID" ] && [ "${{ job.status }}" = "success" ]; then
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary @"$APK" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$(basename "$APK")"
            echo ""
            echo "APK download: https://github.com/${{ github.repository }}/releases/download/$TAG/$(basename "$APK")"
          fi
        fi

        echo "Release page: https://github.com/${{ github.repository }}/releases/tag/$TAG"

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: android/.buildozer/android/platform/build/build.log
        retention-days: 7
