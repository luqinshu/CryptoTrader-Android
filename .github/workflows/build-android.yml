name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK (Debug)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          build-essential git autoconf automake libtool pkg-config cmake \
          openjdk-17-jdk-headless \
          libltdl-dev libffi-dev libssl-dev \
          python3-dev python3-venv \
          gettext autopoint

    - name: Install Python tools
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython setuptools

    - name: Build APK
      working-directory: android
      run: buildozer -v android debug
      env:
        BUILDOZER_ALLOW_ROOT: 1

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: CryptoScannerPro-Debug
        path: android/bin/*.apk
        retention-days: 30

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: android/.buildozer/android/platform/build/build.log
        retention-days: 7
