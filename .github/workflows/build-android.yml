name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK (Debug)
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          build-essential git autoconf automake libtool pkg-config cmake \
          openjdk-17-jdk-headless \
          libltdl-dev libffi-dev libssl-dev \
          python3-dev python3-venv \
          gettext
        sudo apt-get install -y autopoint 2>/dev/null || true
        which autopoint || echo "WARNING: autopoint not found!"
        ls /usr/bin/autopoint* 2>/dev/null || echo "No autopoint in /usr/bin"
        dpkg -L gettext 2>/dev/null | grep autopoint || echo "No autopoint in gettext package"

    - name: Install Python tools
      run: |
        python -m pip install --upgrade pip
        pip install buildozer "cython<3" setuptools

    - name: Set Java 17
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"

    - name: Setup Android SDK (download cmdline-tools + symlink as tools/)
      run: |
        SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
        rm -rf "$SDK_ROOT"
        mkdir -p "$SDK_ROOT"
        # Download cmdline-tools
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools "$SDK_ROOT/cmdline-tools"
        # Symlink as tools/ so buildozer finds tools/bin/sdkmanager
        ln -s "$SDK_ROOT/cmdline-tools" "$SDK_ROOT/tools"
        # Accept licenses
        yes | "$SDK_ROOT/tools/bin/sdkmanager" --sdk_root="$SDK_ROOT" --licenses 2>/dev/null || true
        mkdir -p "$SDK_ROOT/licenses"
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$SDK_ROOT/licenses/android-sdk-license"
        echo "SDK ready, sdkmanager: $(ls -la "$SDK_ROOT/tools/bin/sdkmanager")"

    - name: Build APK
      working-directory: android
      run: |
        echo "=== Cloning and patching p4a for Python 3.11.5 ==="
        P4A_DIR="$GITHUB_WORKSPACE/p4a-patched"
        git clone --depth 1 https://github.com/kivy/python-for-android.git "$P4A_DIR"
        sed -i 's/^    version = ".*"/    version = "3.11.5"/' "$P4A_DIR/pythonforandroid/recipes/hostpython3/__init__.py"
        sed -i "s/^    version = '.*'/    version = '3.11.5'/" "$P4A_DIR/pythonforandroid/recipes/python3/__init__.py"
        echo "PATCHED hostpython3: $(grep 'version\s*=' "$P4A_DIR/pythonforandroid/recipes/hostpython3/__init__.py")"
        echo "PATCHED python3:      $(grep 'version\s*=' "$P4A_DIR/pythonforandroid/recipes/python3/__init__.py")"
        
        echo "=== Patching numpy: missing #include <unordered_map> ==="
        cat > "$P4A_DIR/pythonforandroid/recipes/numpy/fix_unordered_map.patch" << 'PATCH_EOF'
--- a/numpy/_core/src/multiarray/unique.cpp
+++ b/numpy/_core/src/multiarray/unique.cpp
@@ -4,6 +4,7 @@
 #include <Python.h>
 
 #include <unordered_set>
+#include <unordered_map>
 #include <functional>
 
 #include <numpy/npy_common.h>
PATCH_EOF
        sed -i "/min_ndk_api_support/a \    patches = ['fix_unordered_map.patch']" "$P4A_DIR/pythonforandroid/recipes/numpy/__init__.py"
        echo "PATCHED numpy patches: $(grep 'patches' "$P4A_DIR/pythonforandroid/recipes/numpy/__init__.py")"
        sed -i "s|^android\.display_cutout|p4a.source_dir = $P4A_DIR\n&|" buildozer.spec
        
        echo "=== Building with buildozer ==="
        set +o pipefail
        buildozer -v android debug 2>&1 | tee buildozer_output.txt
        EXIT_CODE=${PIPESTATUS[0]}
        set -o pipefail
        echo "BUILDOZER EXIT CODE: ${EXIT_CODE}"
        echo "LS buildozer_output.txt: $(ls -la buildozer_output.txt 2>&1)"
        echo "LS bin: $(ls bin/*.apk 2>&1 || echo 'no apk')"
        echo "GIT status: $(git status --porcelain 2>&1 | head -5)"
        if [ "${EXIT_CODE}" -ne 0 ]; then
          echo "BUILD FAILED WITH CODE ${EXIT_CODE}"
          tail -50 buildozer_output.txt
        fi
        exit ${EXIT_CODE}
      env:
        BUILDOZER_ALLOW_ROOT: 1
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: CryptoScannerPro-Debug
        path: android/bin/*.apk
        retention-days: 30

    - name: Show error location summary
      if: failure()
      working-directory: android
      run: |
        ERROR_FILE="build_extracted_errors.txt"
        {
          echo "======================= ERROR LOCATION REPORT ======================="
          echo ""

          if [ -f buildozer_output.txt ]; then
            TOTAL=$(wc -l < buildozer_output.txt)
            echo "--- buildozer_output.txt ($TOTAL lines total) ---"
            echo ""

            # Extract error lines with line numbers
            grep -n -i "error\|exception\|traceback\|FAILED\|fatal\|abort\|Segmentation" buildozer_output.txt | tail -80 | awk -F: '{printf ">>> LINE %s: %s\n", $1, substr($0, length($1)+2)}'

            echo ""
            echo "--- LAST 80 LINES OF OUTPUT ---"
            tail -80 buildozer_output.txt
            echo ""
          else
            echo "(no buildozer_output.txt)"
          fi

          if [ -d .buildozer ]; then
            echo "--- .buildozer error lines ---"
            grep -rn -i "error\|exception\|traceback\|FAILED\|fatal" .buildozer/ 2>/dev/null | tail -60 || echo "(none)"
          fi

          echo ""
          echo "====================================================================="
          echo "Copy everything between the === lines above to share the error."
        } | tee "$ERROR_FILE"

    - name: Upload error report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-location-report
        path: android/build_extracted_errors.txt
        retention-days: 7

    - name: Publish build output to public release
      if: always()
      working-directory: android
      run: |
        TAG="build-log-run-${{ github.run_number }}"
        echo "Creating release $TAG ..."
        echo "GIT branch: $(git branch --show-current)"
        echo "GIT remote: $(git remote -v)"
        echo "Working dir: $(pwd)"
        echo "GH auth: $(gh auth status 2>&1 || true)"
        echo "Has buildozer_output.txt: $(test -f buildozer_output.txt && echo YES || echo NO)"
        
        # Create tag and release using gh CLI (pre-installed on runner)
        git tag -f "$TAG" 2>/dev/null
        git push -f origin "$TAG" 2>&1 || echo "git push failed (continuing)"
        
        if [ -f buildozer_output.txt ]; then
          gh release create "$TAG" buildozer_output.txt \
            --title "Build #${{ github.run_number }}" \
            --notes "Commit: ${{ github.sha }} - Status: ${{ job.status }}" \
            --repo "${{ github.repository }}" 2>&1 || echo "gh release create failed"
        else
          gh release create "$TAG" \
            --title "Build #${{ github.run_number }}" \
            --notes "Commit: ${{ github.sha }} - Status: ${{ job.status }} - No output file" \
            --repo "${{ github.repository }}" 2>&1 || echo "gh release create failed"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: android/.buildozer/android/platform/build/build.log
        retention-days: 7
